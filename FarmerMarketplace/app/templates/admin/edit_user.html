{% extends 'base.html' %}

{% block content %}
<div class="registration-wrapper"
    style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    <div class="card registration-card"
        style="width: 100%; max-width: 500px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; background: white;">
        <h2 style="color: #2c3e50; font-weight: 700; margin-bottom: 25px; text-align: center;">Edit User: {{
            user.username }}</h2>

        <form action="{{ url_for('admin.edit_user', user_id=user.id) }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Username</label>
                <input type="text" name="username" value="{{ user.username }}" required
                    style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Password (leave blank to keep
                    current)</label>
                <input type="password" name="password"
                    style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Role</label>
                <select name="role" required
                    style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
                    <option value="buyer" {% if user.role=='buyer' %}selected{% endif %}>Buyer</option>
                    <option value="farmer" {% if user.role=='farmer' %}selected{% endif %}>Farmer</option>
                    <option value="admin" {% if user.role=='admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Contact Number</label>
                <input type="text" name="contact_number" value="{{ user.contact_number or '' }}"
                    style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
            </div>

            {% if user.role == 'farmer' %}
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">State</label>
                    <input type="text" name="state" value="{{ user.state or '' }}"
                        style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">District</label>
                    <input type="text" name="district" value="{{ user.district or '' }}"
                        style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
                </div>
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Place</label>
                <input type="text" name="place" value="{{ user.place or '' }}"
                    style="width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px;">
            </div>
            {% endif %}

            <button type="submit" class="btn"
                style="width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;">
                Save Changes
            </button>
            <a href="{{ url_for('admin.users') }}"
                style="display: block; text-align: center; margin-top: 15px; color: #6b7280; text-decoration: none;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
